# Axiom - AI Program Management Stack
# Strategy: Lightweight, 100% Open Source (MIT/Apache 2.0), Orchestration-as-Code.

services:
  # --- PERSISTENCE: Core Data Layer ---
  axiom-db:
    image: postgres:15
    container_name: axiom-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: axiom_secure_2026
      POSTGRES_DB: axiom_hub
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  # --- GOVERNANCE: Roadmap & Asset Tracking (Baserow) ---
  axiom-governance:
    image: baserow/baserow:1.24.2
    container_name: axiom-governance
    environment:
      BASEROW_PUBLIC_URL: http://localhost:8083
      DATABASE_HOST: axiom-db
      DATABASE_PASSWORD: axiom_secure_2026
    ports:
      - "8083:80"
    volumes:
      - baserow_data:/baserow/data
    restart: always

  # --- ANALYTICS: SQL-Driven BI (Metabase) ---
  axiom-analytics:
    image: metabase/metabase:latest
    container_name: axiom-analytics
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: axiom_analytics_db
      MB_DB_HOST: axiom-db
      MB_DB_PASS: axiom_secure_2026
    ports:
      - "3000:3000"
    restart: always

  # --- ORCHESTRATION: Workflow as Code (Kestra) ---
  axiom-bridge:
    image: kestra/kestra:latest
    container_name: axiom-bridge
    command: server standalone
    environment:
      KESTRA_ADMIN_EMAIL: admin@axiom.local
      KESTRA_ADMIN_PASSWORD: Password123!
      KESTRA_CONFIGURATION: |
        kestra:
          server:
            basic-auth:
              enabled: false
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
        datasources:
          postgres:
            url: jdbc:postgresql://axiom-db:5432/axiom_hub
            username: admin
            password: axiom_secure_2026
    ports:
      - "8080:8080"
    volumes:
      - kestra_data:/app/storage
      - shared_docs:/home/kestra/axiom_docs
    restart: always

  # --- VERSIONING: Git Vault (Gitea) ---
  axiom-vault:
    image: gitea/gitea:latest
    container_name: axiom-vault
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=axiom-db:5432
      - GITEA__database__PASS=axiom_secure_2026
    ports:
      - "3001:3000"
    volumes:
      - gitea_data:/data
    restart: always

  # --- VISUALS: Infinite Canvas & Slides (tldraw) ---
  axiom-slides:
    image: foxxmd/tldraw:latest
    container_name: axiom-slides
    ports:
      - "9002:5858"
    restart: always

  # --- DOCUMENTS: File Management & DOCX Editing (FileBrowser + OnlyOffice) ---
  axiom-files:
    image: filebrowser/filebrowser:latest
    container_name: axiom-files
    ports:
      - "8081:80"
    volumes:
      - shared_docs:/srv
      - filebrowser_db:/database.db
    restart: always

  axiom-editor:
    image: onlyoffice/documentserver:latest
    container_name: axiom-editor
    expose:
      - "80"
    restart: always

  # --- INTELLIGENCE: Local LLM Engine (LocalAI) ---
  axiom-ai:
    image: localai/localai:latest-aio-cpu
    container_name: axiom-ai
    environment:
      - MODELS_PATH=/build/models
    ports:
      - "8082:8080"
    volumes:
      - ai_models:/build/models
    restart: always

volumes:
  pg_data:
  baserow_data:
  kestra_data:
  gitea_data:
  shared_docs:
  filebrowser_db:
  ai_models: