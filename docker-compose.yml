# Axiom - High-Performance AI Program Management Stack
# Strategy: Rust/Go Core, Python Automation, SQL-as-Code.

services:
  # --- CORE DATABASE ---
  axiom-db:
    image: postgres:15-alpine
    container_name: axiom-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: axiom_secure_2026
      POSTGRES_DB: axiom_hub
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  # --- ORCHESTRATION: Rust Engine (Windmill) ---
  axiom-bridge:
    image: ghcr.io/windmill-labs/windmill-slim:latest
    container_name: axiom-bridge
    environment:
      - DATABASE_URL=postgres://admin:axiom_secure_2026@axiom-db:5432/axiom_hub
    ports:
      - "8080:8000"
    restart: always

  axiom-worker:
    image: ghcr.io/windmill-labs/windmill:latest
    container_name: axiom-worker
    environment:
      - DATABASE_URL=postgres://admin:axiom_secure_2026@axiom-db:5432/axiom_hub
    command: ["worker"]
    restart: always

  # --- ANALYTICS & SLIDES: Visivo (Go) ---
  axiom-analytics:
    image: visivo/visivo:latest
    container_name: axiom-analytics
    environment:
      - VISIVO_DATABASE_URL=postgres://admin:axiom_secure_2026@axiom-db:5432/axiom_hub
    ports:
      - "3000:3000"
    volumes:
      - ./visuals:/project
    restart: always

  # --- GOVERNANCE: Airtable-like (NocoDB) ---
  axiom-governance:
    image: nocodb/nocodb:latest
    container_name: axiom-governance
    environment:
      - NC_DB=pg://axiom-db:5432?u=admin&p=axiom_secure_2026&d=axiom_hub
    ports:
      - "8083:8080"
    volumes:
      - nocodb_data:/usr/app/data
    restart: always

  # --- VERSIONING: Git Vault (Gitea) ---
  axiom-vault:
    image: gitea/gitea:latest
    container_name: axiom-vault
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=axiom-db:5432
      - GITEA__database__NAME=axiom_hub
      - GITEA__database__USER=admin
      - GITEA__database__PASS=axiom_secure_2026
    ports:
      - "3001:3000"
    volumes:
      - gitea_data:/data
    restart: always

  # --- VISUALS: Whiteboarding (Excalidraw) ---
  axiom-sketch:
    image: excalidraw/excalidraw:latest
    container_name: axiom-sketch
    ports:
      - "9002:80"
    restart: always

  # --- FILE MANAGEMENT ---
  axiom-files:
    image: filebrowser/filebrowser:latest
    container_name: axiom-files
    ports:
      - "8081:80"
    volumes:
      - ./shared_docs:/srv
      - filebrowser_db:/database.db
    restart: always

  # --- INTELLIGENCE: Local LLM API ---
  axiom-ai:
    image: localai/localai:latest-aio-cpu
    container_name: axiom-ai
    ports:
      - "8082:8080"
    volumes:
      - ai_models:/build/models
    restart: always

volumes:
  pg_data:
  nocodb_data:
  gitea_data:
  filebrowser_db:
  ai_models: