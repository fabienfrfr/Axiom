# Axiom - AI Program Management Stack

services:
  # --- SHARED DATABASE: Core persistence layer ---
  axiom-db:
    image: postgres:15
    container_name: axiom-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: axiom_secure_2026
      POSTGRES_DB: axiom_hub
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  # --- GOVERNANCE: Data structure & Roadmap (Baserow) ---
  axiom-governance:
    image: baserow/baserow:1.24.2
    container_name: axiom-governance
    environment:
      BASEROW_PUBLIC_URL: http://localhost:8080
      DATABASE_HOST: axiom-db
      DATABASE_PASSWORD: axiom_secure_2026
    ports:
      - "8080:80"
    volumes:
      - baserow_data:/baserow/data
    restart: always

  # --- ANALYTICS: SQL-based BI (Metabase) ---
  axiom-analytics:
    image: metabase/metabase:latest
    container_name: axiom-analytics
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: axiom_analytics_db
      MB_DB_HOST: axiom-db
      MB_DB_PASS: axiom_secure_2026
    ports:
      - "3000:3000"
    restart: always

  # --- ORCHESTRATION: Workflow automation (n8n) ---
  axiom-bridge:
    image: n8nio/n8n:latest
    container_name: axiom-bridge
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=axiom-db
      - DB_POSTGRESDB_PASSWORD=axiom_secure_2026
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always

  # --- VERSIONING: Git repository (Gitea) ---
  axiom-vault:
    image: gitea/gitea:latest
    container_name: axiom-vault
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=axiom-db:5432
      - GITEA__database__PASS=axiom_secure_2026
    ports:
      - "3001:3000"
    volumes:
      - gitea_data:/data
    restart: always

  # --- WHITEBOARD: Architecture & Flow sketching (Excalidraw) ---
  axiom-sketch:
    image: excalidraw/excalidraw:latest
    container_name: axiom-sketch
    ports:
      - "9001:80"
    restart: always

volumes:
  pg_data:
  baserow_data:
  n8n_data:
  gitea_data: